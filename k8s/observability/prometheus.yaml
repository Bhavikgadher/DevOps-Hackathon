apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: skillpulse
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

    rule_files: []

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
            labels:
              app: "prometheus"

      - job_name: "skillpulse-backend"
        static_configs:
          - targets: ["backend:8080"]

      - job_name: "node_exporter"
        static_configs:
          - targets: ["node-exporter:9100"]
            labels:
              app: "node_exporter"

      - job_name: "nginx_status"
        static_configs:
          - targets: ["frontend:9113"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: skillpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: skillpulse
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
